app = "bullmandu"
primary_region = "sin"

[build]
  command = "npm install && npx prisma generate && npm run build"

[deploy]
  release_command = "npx prisma db push && npm run seed"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = 512

[mounts]
  source = "bullmandu_data"
  destination = "/app/prisma/data"
  initial_size = "1gb"

[env]
  DATABASE_URL = "file:./prisma/data/prod.db"
  PORT = "3000"
  JWT_SECRET = "bullmandu-jwt-secret-change-in-production"
  NEXT_PUBLIC_APP_URL = "https://bullmandu.fly.dev"
  SEED_DEMO_USER_EMAIL = "demo@shareanalysis.app"
  SEED_DEMO_USER_PASSWORD = "DemoPass123!"
